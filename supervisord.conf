[supervisord]
nodaemon=true

[program:Xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1024x768x16
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb_err.log

[program:x11vnc]
command=/bin/bash -lc "export DISPLAY=:99 && /usr/bin/x11vnc -display :99 -forever -passwd $VNC_PASSWORD -rfbport 5900"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc_err.log

[program:xfce4]
command=/bin/bash -lc "export DISPLAY=:99 && dbus-launch --exit-with-session startxfce4"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/xfce4.log
stderr_logfile=/var/log/supervisor/xfce4_err.log

[program:novnc]
command=/bin/bash -lc "/opt/novnc/noVNC/utils/launch.sh --vnc localhost:5900 --listen 6901"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc_err.log